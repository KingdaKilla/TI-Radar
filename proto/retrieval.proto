// =============================================================================
// retrieval.proto — Retrieval Service für die Technology Intelligence Platform
// =============================================================================
// Semantische Suche über eingebettete Dokumente via pgvector.
// Der LLM-Service oder Orchestrator sendet eine Query und erhält die
// relevantesten Dokumente als Kontext für RAG-Analysen zurück.
// =============================================================================

syntax = "proto3";

package tip.retrieval;

option java_multiple_files = true;
option java_package = "de.tip.proto.retrieval";
option go_package = "tip/proto/retrieval";

// ---------------------------------------------------------------------------
// Retrieval Service — Semantische Dokumentensuche via pgvector.
// ---------------------------------------------------------------------------
service RetrievalService {
  // Führt eine semantische Suche über eingebettete Dokumente durch
  // und liefert die Top-K ähnlichsten Dokumente zurück.
  rpc Retrieve(RetrievalRequest) returns (RetrievalResponse);
}

// ---------------------------------------------------------------------------
// Request: Semantische Suche nach relevanten Dokumenten.
// ---------------------------------------------------------------------------
message RetrievalRequest {
  // Technologie-Suchbegriff für den Kontext, z.B. "solid-state batteries".
  string technology = 1;

  // Freie Suchanfrage, z.B. "Welche Forschungsgruppen arbeiten an ...?"
  string query = 2;

  // Maximale Anzahl zurückgegebener Dokumente (Standard: 10).
  int32 top_k = 3;

  // Zu durchsuchende Quellen: ["patents", "projects", "papers"].
  // Leeres Array = alle Quellen.
  repeated string sources = 4;

  // Opaque Request-ID für verteiltes Tracing / Korrelation.
  string request_id = 5;
}

// ---------------------------------------------------------------------------
// Response: Gefundene Dokumente mit Ähnlichkeitsscores.
// ---------------------------------------------------------------------------
message RetrievalResponse {
  // Liste der gefundenen Dokumente, absteigend nach Ähnlichkeit sortiert.
  repeated RetrievedDocument documents = 1;

  // Zeit in Millisekunden für das Embedding der Query.
  float query_embedding_ms = 2;

  // Zeit in Millisekunden für die pgvector-Suche.
  float search_ms = 3;
}

// ---------------------------------------------------------------------------
// Ein einzelnes gefundenes Dokument mit Metadaten.
// ---------------------------------------------------------------------------
message RetrievedDocument {
  // Dokumentquelle: "patent" | "project" | "paper".
  string source = 1;

  // Quell-ID des Dokuments (z.B. Patent-Nummer, CORDIS-Projekt-ID).
  string source_id = 2;

  // Titel des Dokuments.
  string title = 3;

  // Textausschnitt (Abstract, Objective, Titel) für die Anzeige.
  string text_snippet = 4;

  // Kosinus-Ähnlichkeit zur Query im Bereich [0, 1].
  float similarity_score = 5;

  // Zusätzliche Metadaten als Key-Value-Paare
  // (z.B. "year", "country", "cpc_codes", "programme").
  map<string, string> metadata = 6;
}
